<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RailPrep — RRB NTPC Prep App</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800;900&family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;700&family=Noto+Sans+Devanagari:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  html, body { margin: 0; padding: 0; background: #f0eee9; overflow: hidden; }
  * { box-sizing: border-box; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Tokens first (plain JS), then starters, then components and screens -->
<script src="components/tokens.js"></script>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel" src="components/icons.jsx"></script>
<script type="text/babel" src="components/ui.jsx"></script>
<script type="text/babel" src="components/phone.jsx"></script>
<script type="text/babel" src="screens/auth.jsx"></script>
<script type="text/babel" src="screens/learn.jsx"></script>
<script type="text/babel" src="screens/tests.jsx"></script>
<script type="text/babel" src="screens/feed.jsx"></script>
<script type="text/babel" src="screens/profile.jsx"></script>

<script type="text/babel" data-presets="react">

const TWEAKS = /*EDITMODE-BEGIN*/{
  "accentColor": "#f59a2e",
  "primaryColor": "#2b3ea8",
  "showHindiLabels": true,
  "layoutDensity": "comfortable"
}/*EDITMODE-END*/;

// Override tokens at runtime if tweaks change
function applyTweaks(tw) {
  window.TOKENS.primary = tw.primaryColor;
  window.TOKENS.amber = tw.accentColor;
}

function App() {
  const [tweaks, setTweaks] = React.useState(TWEAKS);
  const [editMode, setEditMode] = React.useState(false);

  React.useEffect(() => {
    const onMsg = (e) => {
      const d = e.data || {};
      if (d.type === '__activate_edit_mode') setEditMode(true);
      if (d.type === '__deactivate_edit_mode') setEditMode(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
    return () => window.removeEventListener('message', onMsg);
  }, []);

  applyTweaks(tweaks);

  const updateTweak = (k, v) => {
    const next = { ...tweaks, [k]: v };
    setTweaks(next);
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { [k]: v } }, '*');
  };

  return (
    <>
      <DesignCanvas>

        <DCSection id="intro" title="RailPrep · RRB NTPC Prep App"
          subtitle="A complete, self-updating Android prototype — 23 screens across onboarding, learning, testing, live content, community & monetization. Dynamic content indicators surface where data auto-syncs.">

          <DCArtboard id="splash" label="01 · Splash" width={360} height={780}>
            <ScreenSplash/>
          </DCArtboard>
          <DCArtboard id="lang" label="02 · Language select" width={360} height={780}>
            <ScreenLanguage/>
          </DCArtboard>
          <DCArtboard id="onboarding" label="03 · Onboarding" width={360} height={780}>
            <ScreenOnboarding/>
          </DCArtboard>
          <DCArtboard id="auth" label="04 · Login / OTP" width={360} height={780}>
            <ScreenAuth/>
          </DCArtboard>
          <DCArtboard id="goal" label="05 · Goal setup" width={360} height={780}>
            <ScreenGoal/>
          </DCArtboard>

          <DCPostIt top={-40} right={20} rotate={3} width={180}>
            First-run flow: pick language → intro → OTP login → exam goal. Warmest step is language — India-first.
          </DCPostIt>
        </DCSection>

        <DCSection id="home" title="Home & Learning" subtitle="Daily anchor, subject map, and chapter-level lessons with video + notes.">
          <DCArtboard id="home" label="06 · Home dashboard ⭐" width={360} height={780}>
            <ScreenHome/>
          </DCArtboard>
          <DCArtboard id="subjects" label="07 · All subjects" width={360} height={780}>
            <ScreenSubjects/>
          </DCArtboard>
          <DCArtboard id="lesson" label="08 · Lesson detail" width={360} height={780}>
            <ScreenLesson/>
          </DCArtboard>
          <DCArtboard id="video" label="09 · Video player" width={360} height={780}>
            <ScreenVideo/>
          </DCArtboard>
          <DCArtboard id="pdf" label="10 · PDF library" width={360} height={780}>
            <ScreenPDF/>
          </DCArtboard>

          <DCPostIt top={-40} left={20} rotate={-2} width={200}>
            The home screen's exam countdown "ticket" is the signature feature — unique metaphor tied to the railways theme.
          </DCPostIt>
        </DCSection>

        <DCSection id="tests" title="Mock Tests & Assessment" subtitle="The core monetizable flow. Full CBT-1 pattern with live national tests.">
          <DCArtboard id="tests-list" label="11 · Tests list" width={360} height={780}>
            <ScreenTests/>
          </DCArtboard>
          <DCArtboard id="tests-instr" label="12 · Instructions" width={360} height={780}>
            <ScreenTestInstructions/>
          </DCArtboard>
          <DCArtboard id="quiz" label="13 · Question player ⭐" width={360} height={780}>
            <ScreenQuiz/>
          </DCArtboard>
          <DCArtboard id="results" label="14 · Results" width={360} height={780}>
            <ScreenResults/>
          </DCArtboard>
          <DCArtboard id="analytics" label="15 · Analytics" width={360} height={780}>
            <ScreenAnalytics/>
          </DCArtboard>
        </DCSection>

        <DCSection id="dynamic" title="Self-updating Dynamic Content" subtitle="Every screen here syncs automatically. Last-sync indicators visible throughout.">
          <DCArtboard id="feed" label="16 · Current affairs feed" width={360} height={780}>
            <ScreenFeed/>
          </DCArtboard>
          <DCArtboard id="notif" label="17 · Notifications" width={360} height={780}>
            <ScreenNotifications/>
          </DCArtboard>
          <DCArtboard id="exam-notif" label="18 · Exam notification" width={360} height={780}>
            <ScreenExamNotif/>
          </DCArtboard>
          <DCArtboard id="offline" label="19 · Offline mode" width={360} height={780}>
            <ScreenOffline/>
          </DCArtboard>
        </DCSection>

        <DCSection id="social" title="Community, Progress & Monetization" subtitle="Social proof, gamification, doubt-solving, and the Pro paywall.">
          <DCArtboard id="profile" label="20 · Profile" width={360} height={780}>
            <ScreenProfile/>
          </DCArtboard>
          <DCArtboard id="leaderboard" label="21 · Leaderboard" width={360} height={780}>
            <ScreenLeaderboard/>
          </DCArtboard>
          <DCArtboard id="doubts" label="22 · Doubts / Community" width={360} height={780}>
            <ScreenDoubts/>
          </DCArtboard>
          <DCArtboard id="pro" label="23 · Pro upgrade ⭐" width={360} height={780}>
            <ScreenPro/>
          </DCArtboard>

          <DCPostIt top={-40} right={40} rotate={2} width={200}>
            Pro at ₹133/mo is the monetization hook. Paywall surfaces after a user hits a locked mock or analytics page.
          </DCPostIt>
        </DCSection>
      </DesignCanvas>

      {editMode && <TweakPanel tweaks={tweaks} onChange={updateTweak}/>}
    </>
  );
}

function TweakPanel({ tweaks, onChange }) {
  const T = window.TOKENS;
  return (
    <div style={{
      position: 'fixed', right: 20, bottom: 20, width: 280,
      background: '#1a1a1a', color: '#fff',
      borderRadius: 16, padding: 16, zIndex: 1000,
      fontFamily: T.sans, boxShadow: '0 20px 50px rgba(0,0,0,0.4)',
    }}>
      <div style={{ fontSize: 14, fontWeight: 800, marginBottom: 10 }}>Tweaks</div>
      <div style={{ display: 'flex', flexDirection: 'column', gap: 12 }}>
        <div>
          <div style={{ fontSize: 11, opacity: 0.6, marginBottom: 6 }}>Primary color</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['#2b3ea8','#7c3aed','#16a34a','#dc2626','#0891b2','#0e1422'].map(c =>
              <div key={c} onClick={() => onChange('primaryColor', c)} style={{
                width: 28, height: 28, borderRadius: 6, background: c, cursor: 'pointer',
                border: tweaks.primaryColor === c ? '2px solid #fff' : '2px solid transparent',
              }}/>
            )}
          </div>
        </div>
        <div>
          <div style={{ fontSize: 11, opacity: 0.6, marginBottom: 6 }}>Accent color</div>
          <div style={{ display: 'flex', gap: 6 }}>
            {['#f59a2e','#16a34a','#dc2626','#7c3aed','#0891b2'].map(c =>
              <div key={c} onClick={() => onChange('accentColor', c)} style={{
                width: 28, height: 28, borderRadius: 6, background: c, cursor: 'pointer',
                border: tweaks.accentColor === c ? '2px solid #fff' : '2px solid transparent',
              }}/>
            )}
          </div>
        </div>
        <div style={{ fontSize: 10, opacity: 0.4, lineHeight: 1.4, marginTop: 4 }}>
          Refresh the page after changing color to see it applied everywhere.
        </div>
      </div>
    </div>
  );
}

// Give everything a moment to load, then render
setTimeout(() => {
  ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
}, 50);
</script>
</body>
</html>
